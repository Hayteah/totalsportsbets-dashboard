name: PR Checks — Lint & Quality Gate

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx next lint --dir src --format github
        # next lint uses the built-in Next.js ESLint config (no .eslintrc needed)

  # ─────────────────────────────────────────────────────────────────────────────
  # Jules (Google) runs as a GitHub collaborator — no workflow step needed here.
  # Add Jules to your repo at: https://jules.google.com
  # Jules will automatically pick up test tasks assigned in issues or PR comments.
  #
  # Until Jules is connected, this job runs a placeholder build-time smoke test.
  # ─────────────────────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test (Jules integration slot)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build smoke test
        # Validates the app compiles without runtime errors
        run: npm run build
        env:
          NEXT_PUBLIC_APP_ENV: test

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [lint, smoke-test]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" || "${{ needs.smoke-test.result }}" != "success" ]]; then
            echo "Quality gate failed — one or more checks did not pass."
            exit 1
          fi
          echo "All quality checks passed. PR is ready for review."
